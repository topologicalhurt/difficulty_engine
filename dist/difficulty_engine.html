<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; base-uri 'none'; object-src 'none'; img-src 'self' data: blob:; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'self' https: http://127.0.0.1:* http://localhost:* http://[::1]:*;"
    />
    <title>Difficulty Engine</title>
    <style>
.difficulty-engine-app {
  --bg: #0b1020;
  --bg-alt: #10182b;
  --panel: #111a2d;
  --panel-alt: #151f35;
  --panel-soft: rgba(255, 255, 255, 0.028);
  --border: rgba(189, 205, 233, 0.18);
  --border-strong: rgba(189, 205, 233, 0.34);
  --text: #eef4ff;
  --muted: #97a9ca;
  --accent: #6fd3a3;
  --accent-strong: #9cf0c8;
  --danger: #ff7b7b;
  --warn: #f9cc63;
  --success: #6fd3a3;
  --shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
  --radius: 4px;
  --radius-sm: 2px;
  --radius-xs: 1px;
  --font-ui:
    'SFMono-Regular', 'SF Mono', 'JetBrains Mono', 'Menlo', 'Monaco',
    'Consolas', monospace;
  --font-display:
    'SFMono-Regular', 'SF Mono', 'JetBrains Mono', 'Menlo', 'Monaco',
    'Consolas', monospace;
  min-height: 100vh;
  color: var(--text);
  background:
    radial-gradient(
      circle at top left,
      rgba(111, 211, 163, 0.04),
      transparent 24%
    ),
    linear-gradient(180deg, #09101d 0%, #0d1422 100%);
  isolation: isolate;
  font-family: var(--font-ui);
}

.difficulty-engine-app,
.difficulty-engine-app * {
  box-sizing: border-box;
}

body.difficulty-engine-standalone {
  margin: 0;
  background: #0b1020;
}

body.difficulty-engine-standalone #app {
  min-height: 100vh;
  background: #0b1020;
}

.difficulty-engine-app button,
.difficulty-engine-app input,
.difficulty-engine-app textarea,
.difficulty-engine-app select {
  font: inherit;
}

.app-shell {
  display: grid;
  gap: 14px;
  width: min(1660px, 100%);
  margin: 0 auto;
  padding: 16px;
}

.app-header,
.tab-strip-wrap,
.card,
.stat-card,
.banner {
  box-shadow: var(--shadow);
}

.app-header {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  align-items: flex-start;
  padding: 14px 16px;
  border-radius: var(--radius);
  background: rgba(17, 26, 45, 0.96);
  border: 1px solid var(--border);
}

.app-header-main {
  display: grid;
  gap: 8px;
  max-width: 780px;
}

.app-header-main h1,
.card-header h2,
.inspector-title {
  margin: 0;
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 0.01em;
}

.app-header-side {
  display: grid;
  grid-template-columns: repeat(4, minmax(92px, 1fr));
  gap: 10px;
  min-width: 420px;
}

.header-stat,
.stat-card,
.calendar-day-cell,
.gantt-board-row,
.ladder-row,
.calendar-chip,
.book-list-item,
.weekday-chip {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--panel-soft);
}

.header-stat {
  display: grid;
  gap: 4px;
  padding: 12px 14px;
}

.header-stat strong {
  font-size: 1.1rem;
}

.eyebrow,
.stat-label,
.field-help,
.muted-copy,
.bar-label,
.bar-value,
.calendar-cell-weekday,
.calendar-missed {
  color: var(--muted);
}

.eyebrow {
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-size: 0.72rem;
}

.tab-strip-wrap {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: center;
  padding: 8px 12px;
  border-radius: var(--radius);
  background: rgba(17, 26, 45, 0.96);
  border: 1px solid var(--border);
}

.tab-strip,
.toolbar-row,
.detail-toolbar,
.badge-row,
.list-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.detail-spacer {
  flex: 1;
}

.inline-control {
  display: inline-flex;
  gap: 7px;
  align-items: center;
}

.tab-button,
.primary-button,
.ghost-button,
.book-list-item,
.weekday-chip,
.calendar-chip,
.ladder-row {
  transition:
    transform 120ms ease,
    border-color 120ms ease,
    background 120ms ease;
}

.tab-button,
.primary-button,
.ghost-button,
.book-list-item,
.calendar-chip,
.ladder-row {
  padding: 9px 11px;
  color: var(--text);
  text-align: left;
  cursor: pointer;
}

.tab-button,
.primary-button,
.ghost-button {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.03);
}

.tab-button:hover,
.primary-button:hover,
.ghost-button:hover,
.book-list-item:hover,
.calendar-chip:hover,
.ladder-row:hover,
.weekday-chip:hover {
  transform: translateY(-1px);
  border-color: var(--border-strong);
}

.book-list-item:hover,
.calendar-chip:hover,
.ladder-row:hover {
  transform: none;
}

.tab-button.active,
.primary-button {
  background: rgba(111, 211, 163, 0.12);
  border-color: rgba(111, 211, 163, 0.5);
}

.ghost-button {
  background: transparent;
}

.ghost-button:disabled,
.compact-button:disabled {
  cursor: not-allowed;
  opacity: 0.38;
}

.danger-button {
  color: #ffd9d9;
  border-color: rgba(255, 123, 123, 0.35);
}

.warn-button {
  color: #fff0c2;
  border-color: rgba(249, 204, 99, 0.4);
}

.main-content {
  display: grid;
  gap: 18px;
}

.workspace-content {
  align-content: start;
}

.banner {
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

.banner-info {
  background: rgba(93, 144, 255, 0.14);
}

.banner-success {
  background: rgba(111, 211, 163, 0.14);
}

.banner-warn {
  background: rgba(249, 204, 99, 0.12);
}

.banner-error {
  background: rgba(255, 123, 123, 0.14);
}

.split-layout {
  display: grid;
  grid-template-columns: 340px minmax(0, 1fr);
  gap: 18px;
}

.stack-layout {
  display: grid;
  gap: 16px;
}

.compact-stack {
  gap: 10px;
}

.triple-layout {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 18px;
}

.card {
  border-radius: var(--radius);
  background: rgba(17, 26, 45, 0.94);
  border: 1px solid var(--border);
  overflow: hidden;
}

.card-header {
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--border);
}

.card-body {
  padding: 14px;
  display: grid;
  gap: 12px;
}

.field,
.field-label-wrap {
  display: grid;
  gap: 6px;
}

.form-grid {
  display: grid;
  gap: 12px;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}

.flag-grid {
  display: grid;
  gap: 12px;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
}

.field-label {
  font-weight: 600;
}

.text-input,
.select-input,
.text-area {
  width: 100%;
  border: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.04);
  color: var(--text);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
}

.text-area {
  resize: vertical;
}

.ai-prompt-area {
  min-height: 180px;
}

.ai-proposal-card {
  border-left: 3px solid rgba(111, 211, 163, 0.56);
}

.checkbox-input {
  width: 18px;
  height: 18px;
}

.planner-layout {
  display: grid;
  gap: 18px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
}

.planner-stats-grid {
  grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
}

.stat-card {
  padding: 12px;
  background: rgba(255, 255, 255, 0.03);
}

.planner-stat-card {
  gap: 6px;
  display: grid;
}

.stat-value {
  font-size: 1.45rem;
  font-weight: 700;
}

.planner-chart-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 18px;
}

.chart-card-copy {
  font-size: 0.92rem;
}

.bar-chart {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(52px, 1fr));
  gap: 10px;
  align-items: end;
  min-height: 220px;
}

.compact-chart {
  min-height: 180px;
}

.bar-chart-col {
  display: grid;
  gap: 8px;
  align-items: end;
}

.bar-chart-stack {
  position: relative;
  min-height: 150px;
  padding-top: 10px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

.bar-target,
.bar-fill {
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 34px;
  border-radius: 3px 3px 2px 2px;
  transform: translateX(-50%);
}

.bar-target {
  background: rgba(255, 255, 255, 0.08);
  border: 1px dashed rgba(255, 255, 255, 0.18);
}

.bar-fill {
  background: linear-gradient(
    180deg,
    rgba(111, 211, 163, 0.98),
    rgba(91, 179, 218, 0.98)
  );
}

.bar-fill-muted {
  background: linear-gradient(
    180deg,
    rgba(249, 204, 99, 0.95),
    rgba(230, 154, 69, 0.95)
  );
}

.bar-value {
  font-size: 0.82rem;
  text-align: center;
}

.bar-label {
  font-size: 0.74rem;
  text-align: center;
}

.ladder-row {
  display: grid;
  gap: 10px;
  background: rgba(255, 255, 255, 0.02);
}

.ladder-row.selected {
  background: rgba(111, 211, 163, 0.12);
  border-color: rgba(111, 211, 163, 0.44);
}

.ladder-top {
  display: flex;
  justify-content: space-between;
  gap: 12px;
}

.ladder-bar {
  height: 10px;
  border-radius: 3px;
  background: rgba(255, 255, 255, 0.08);
  overflow: hidden;
}

.ladder-fill {
  height: 100%;
  border-radius: inherit;
}

.warning-list,
.stack-list,
.book-list {
  display: grid;
  gap: 12px;
}

.planner-warning-list {
  gap: 10px;
}

.warning-item,
.stack-row,
.book-list-item {
  padding: 14px;
}

.warning-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.warning-copy {
  gap: 4px;
}

.warning-fail {
  background: rgba(255, 123, 123, 0.08);
}

.warning-warn {
  background: rgba(249, 204, 99, 0.07);
}

.book-list-item.selected {
  background: rgba(111, 211, 163, 0.16);
  border-color: rgba(111, 211, 163, 0.45);
}

.book-title-button {
  padding: 0;
  color: var(--text);
  font-weight: 700;
  text-align: left;
  cursor: pointer;
  background: transparent;
  border: 0;
}

.book-order-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}

.compact-button {
  min-width: 34px;
  padding: 5px 8px;
  text-align: center;
}

.compact-select {
  max-width: 230px;
}

.book-list-top,
.calendar-chip-top,
.calendar-cell-head,
.progress-head,
.ladder-top {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
}

.progress-block {
  display: grid;
  gap: 7px;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.025);
}

.compact-progress {
  padding: 8px;
  gap: 6px;
}

.progress-head {
  font-size: 0.84rem;
}

.progress-track {
  height: 8px;
  overflow: hidden;
  border-radius: 2px;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.08);
}

.progress-fill {
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(
    90deg,
    rgba(111, 211, 163, 0.92),
    rgba(91, 179, 218, 0.92)
  );
}

.progress-detail {
  font-size: 0.78rem;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 9px;
  border-radius: 3px;
  font-size: 0.75rem;
  border: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.06);
}

.compact-badge-row {
  gap: 6px;
}

.badge-success {
  background: rgba(111, 211, 163, 0.14);
}

.badge-warn {
  background: rgba(249, 204, 99, 0.12);
}

.badge-danger {
  background: rgba(255, 123, 123, 0.14);
}

.planner-main-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.7fr) minmax(320px, 0.8fr);
  gap: 14px;
  align-items: start;
}

.planner-main-column,
.planner-side-column {
  display: grid;
  gap: 14px;
}

.settings-shell .card {
  background: linear-gradient(
    180deg,
    rgba(17, 26, 45, 0.98),
    rgba(17, 26, 45, 0.92)
  );
}

.settings-grid {
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
}

.settings-grid .field {
  padding: 10px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  background: rgba(255, 255, 255, 0.015);
}

.source-toggle-row {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 10px;
  align-items: start;
  padding: 10px;
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.018);
}

.source-toggle-row input[type='checkbox'] {
  margin-top: 3px;
}

.source-subtree {
  display: grid;
  gap: 10px;
  margin-top: 8px;
  padding: 12px;
  border: 1px dashed rgba(255, 255, 255, 0.14);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.014);
}

.inline-code {
  display: block;
  overflow-x: auto;
  max-width: 100%;
  padding: 8px 10px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: var(--radius-sm);
  background: rgba(0, 0, 0, 0.18);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.86rem;
  white-space: nowrap;
}

.gantt-board {
  display: grid;
  gap: 10px;
}

.gantt-scroll-wrap {
  overflow-x: auto;
  padding-bottom: 2px;
}

.gantt-board-head,
.gantt-board-row {
  display: grid;
  grid-template-columns: 260px minmax(0, 1fr);
  gap: 14px;
}

.gantt-head-meta {
  padding: 8px 0;
}

.gantt-axis {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: minmax(56px, 1fr);
  gap: 0;
  min-height: 44px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.gantt-axis-cell {
  display: grid;
  align-content: center;
  gap: 2px;
  padding: 8px 10px;
  border-left: 1px solid rgba(255, 255, 255, 0.06);
  background: rgba(255, 255, 255, 0.025);
}

.gantt-axis-cell:first-child {
  border-left: none;
}

.gantt-board-row {
  padding: 10px;
  background: rgba(255, 255, 255, 0.025);
  contain: layout paint;
}

.gantt-board-row.selected {
  background: rgba(111, 211, 163, 0.08);
  border-color: rgba(111, 211, 163, 0.4);
}

.gantt-name-cell {
  display: grid;
  gap: 8px;
  align-content: start;
}

.gantt-timeline-cell {
  position: relative;
  min-height: 82px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background:
    linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.025),
      rgba(255, 255, 255, 0.01)
    ),
    linear-gradient(
      90deg,
      rgba(255, 255, 255, 0.02) 0,
      rgba(255, 255, 255, 0.02) 1px,
      transparent 1px,
      transparent 100%
    );
  overflow: hidden;
}

.gantt-gridlines {
  position: absolute;
  inset: 0;
}

.gantt-week-marker,
.gantt-release-marker {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 0;
}

.gantt-week-marker {
  border-left: 1px solid rgba(255, 255, 255, 0.08);
}

.gantt-release-marker {
  border-left: 1px dashed rgba(249, 204, 99, 0.85);
  z-index: 2;
}

.gantt-baseline-fill,
.gantt-actual-bar {
  position: absolute;
  top: 24px;
  height: 16px;
  border-radius: 1px;
}

.gantt-baseline-fill {
  border: 1px solid transparent;
}

.gantt-actual-bar {
  top: 40px;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
}

.gantt-zoom-button {
  min-width: 52px;
  text-align: center;
}

.gantt-track-note {
  position: absolute;
  left: 12px;
  right: 12px;
  bottom: 10px;
  font-size: 0.8rem;
}

.calendar-board {
  display: grid;
  gap: 12px;
}

.calendar-week {
  display: grid;
  gap: 10px;
  contain: layout paint;
}

.calendar-week-label {
  font-weight: 700;
}

.calendar-week-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 6px;
  min-width: 0;
}

.calendar-day-cell {
  display: grid;
  gap: 8px;
  align-content: start;
  min-height: 186px;
  min-width: 0;
  overflow: hidden;
  padding: 8px;
  contain: layout paint;
}

.calendar-day-cell.has-work {
  background: rgba(255, 255, 255, 0.05);
}

.calendar-day-cell.clickable-cell {
  cursor: pointer;
}

.calendar-day-cell.muted-day {
  opacity: 0.78;
}

.calendar-day-cell.status-outside_plan,
.calendar-day-cell.status-non_study_day {
  background: rgba(255, 255, 255, 0.025);
}

.calendar-day-cell.status-blocked,
.calendar-day-cell.status-no_feasible_chunk {
  border-color: rgba(238, 155, 92, 0.42);
}

.calendar-entry-list {
  display: grid;
  gap: 6px;
  min-width: 0;
  overflow: hidden;
}

.calendar-log-panel {
  display: grid;
  gap: 8px;
  padding: 10px;
  border: 1px solid rgba(72, 187, 153, 0.32);
  border-radius: var(--radius-sm);
  background: rgba(72, 187, 153, 0.07);
  min-width: 0;
  position: sticky;
  top: 12px;
  z-index: 1;
}

.calendar-log-panel-head {
  display: flex;
  gap: 10px;
  justify-content: space-between;
  align-items: flex-start;
  min-width: 0;
}

.week-grid-list {
  gap: 6px;
}

.calendar-chip {
  display: grid;
  gap: 5px;
  padding: 7px 8px;
  background: rgba(255, 255, 255, 0.03);
  text-align: left;
  min-width: 0;
  max-width: 100%;
  overflow: hidden;
}

.calendar-chip.boosted {
  border-style: dashed;
  border-color: rgba(249, 204, 99, 0.68);
  background: rgba(249, 204, 99, 0.055);
}

.calendar-chip.selected {
  background: rgba(72, 187, 153, 0.09);
  box-shadow: inset 0 0 0 1px rgba(72, 187, 153, 0.34);
}

.calendar-chip-title {
  display: inline-flex;
  gap: 5px;
  align-items: center;
  min-width: 0;
  overflow: hidden;
}

.calendar-chip-title span:last-child,
.calendar-chip-top > .muted-copy,
.calendar-day-summary,
.calendar-cell-date,
.calendar-chip-detail,
.badge {
  min-width: 0;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.calendar-boost-icon {
  display: inline-grid;
  flex: 0 0 auto;
  place-items: center;
  width: 15px;
  height: 15px;
  border: 1px solid rgba(249, 204, 99, 0.9);
  border-radius: 50%;
  color: var(--warn);
  font-size: 0.72rem;
  line-height: 1;
}

.calendar-cell-date {
  display: grid;
  gap: 1px;
}

.calendar-day-summary {
  text-align: right;
  font-size: 0.75rem;
}

.calendar-chip-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
  padding-top: 4px;
  min-width: 0;
}

.calendar-log-fields {
  display: grid;
  grid-template-columns: repeat(2, minmax(92px, 1fr));
  gap: 6px;
  flex: 1 1 100%;
  min-width: 0;
}

.calendar-log-field {
  display: grid;
  gap: 3px;
  min-width: 0;
  color: var(--muted);
  font-size: 0.72rem;
}

.calendar-chip-menu {
  position: relative;
}

.calendar-chip-summary {
  width: fit-content;
  padding: 3px 7px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  color: var(--muted);
  font-size: 0.72rem;
  cursor: pointer;
  list-style: none;
}

.calendar-chip-summary::-webkit-details-marker {
  display: none;
}

.calendar-chip-detail {
  margin-top: 5px;
  font-size: 0.72rem;
}

.calendar-chip-menu:not([open]) .calendar-chip-actions,
.calendar-chip-menu:not([open]) .calendar-chip-detail {
  display: none;
}

.calendar-time-label {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  min-width: 0;
  color: var(--muted);
  font-size: 0.72rem;
}

.calendar-time-input {
  width: 100%;
  padding: 4px 5px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: rgba(255, 255, 255, 0.04);
  color: var(--text);
  font: inherit;
}

.calendar-action-button {
  max-width: 100%;
  min-height: 24px;
  padding: 4px 7px;
  font-size: 0.72rem;
}

.library-search-input {
  min-width: min(420px, 100%);
}

.search-results {
  display: grid;
  gap: 10px;
}

.search-result-card {
  display: grid;
  gap: 10px;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.03);
}

.compact-search-input {
  min-width: 0;
}

.compact-search-results {
  gap: 8px;
}

.compact-search-card {
  gap: 8px;
  padding: 9px;
}

.search-result-top {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
}

.calendar-empty {
  font-size: 0.84rem;
}

.calendar-missed {
  font-size: 0.8rem;
}

.inspector-title {
  font-size: 1.35rem;
}

.inspector-metric-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.inspector-metric {
  display: grid;
  gap: 4px;
  padding: 12px;
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
}

.table-wrap {
  overflow: auto;
}

.graph-panel {
  display: grid;
  gap: 12px;
}

.graph-hint {
  font-size: 0.88rem;
}

.graph-viewport-frame {
  overflow: hidden;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: rgba(9, 16, 29, 0.68);
  min-height: 260px;
  cursor: grab;
  touch-action: none;
  contain: layout paint;
}

.graph-viewport-frame[data-dragging='true'] {
  cursor: grabbing;
}

.graph-viewport-content {
  transform-origin: center center;
  transition: transform 80ms linear;
}

.graph-control-button {
  min-width: 52px;
  text-align: center;
}

.graph-svg {
  width: 100%;
  min-height: 260px;
  display: block;
}

.diagnostics-graph-grid {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.graph-options-dropdown {
  display: grid;
  gap: 12px;
}

.graph-options-summary {
  cursor: pointer;
  color: var(--text);
  font-weight: 700;
  letter-spacing: 0.01em;
}

.graph-options-grid {
  margin-top: 12px;
}

.diff-card {
  display: grid;
  gap: 10px;
  padding: 12px;
  border: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.025);
}

.diff-card-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
}

.diff-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}

.diff-pane {
  display: grid;
  gap: 8px;
  padding: 10px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  background: rgba(255, 255, 255, 0.015);
}

.diff-pane-added {
  border-color: rgba(249, 204, 99, 0.22);
  background: rgba(249, 204, 99, 0.06);
}

.diff-pane-label {
  font-weight: 700;
}

.diff-topic-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.data-table {
  width: 100%;
  border-collapse: collapse;
}

.data-table th,
.data-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  text-align: left;
  vertical-align: top;
}

.empty-state {
  padding: 18px;
  border: 1px dashed var(--border);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.03);
}

.info-list {
  margin: 0;
  padding-left: 18px;
  display: grid;
  gap: 8px;
}

.weekday-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.weekday-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  background: rgba(255, 255, 255, 0.04);
}

.weekday-chip input {
  accent-color: var(--accent);
}

.weekday-chip.active {
  background: rgba(111, 211, 163, 0.16);
}

.relation-selector {
  display: grid;
  gap: 6px;
  max-height: 180px;
  overflow: auto;
}

.relation-option {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 8px;
  align-items: start;
  padding: 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.025);
}

.relation-option.selected {
  border-color: rgba(111, 211, 163, 0.55);
  background: rgba(111, 211, 163, 0.1);
}

.relation-option .badge {
  margin-left: 6px;
}

.hidden-file-input {
  display: none;
}

.json-area {
  min-height: 360px;
  font-family: 'SF Mono', 'Menlo', monospace;
}

.settings-context,
.difficulty-map-panel {
  display: grid;
  gap: 10px;
}

.settings-context p {
  margin: 0;
}

.settings-layout-grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(260px, 340px);
  gap: 14px;
  align-items: start;
}

.settings-groups-column {
  display: grid;
  gap: 14px;
  min-width: 0;
}

.settings-context-sidebar {
  position: sticky;
  top: 12px;
}

.settings-option-detail {
  padding: 10px;
  border: 1px solid rgba(111, 211, 163, 0.28);
  border-radius: var(--radius-sm);
  color: var(--accent-strong);
  background: rgba(111, 211, 163, 0.07);
}

.settings-group-toolbar,
.difficulty-map-summary {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.difficulty-map-summary span {
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--muted);
  background: rgba(255, 255, 255, 0.03);
}

.difficulty-map-svg {
  width: 100%;
  min-height: 250px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.02);
}

.chart-axis {
  stroke: rgba(189, 205, 233, 0.32);
  stroke-width: 1;
}

.chart-axis-label {
  fill: var(--muted);
  font-size: 7px;
  letter-spacing: 0.02em;
}

.difficulty-map-legend-box {
  fill: rgba(11, 16, 32, 0.74);
  stroke: rgba(189, 205, 233, 0.22);
  stroke-width: 1;
}

.difficulty-map-legend-label,
.difficulty-map-guide-label {
  fill: var(--muted);
  font-size: 7px;
  letter-spacing: 0.015em;
}

.difficulty-map-identity {
  fill: none;
  stroke: rgba(189, 205, 233, 0.34);
  stroke-width: 1.5;
  stroke-dasharray: 5 5;
}

.difficulty-map-curve {
  fill: none;
  stroke: var(--accent);
  stroke-width: 2.2;
}

.difficulty-map-guide {
  stroke: rgba(249, 204, 99, 0.54);
  stroke-width: 1;
  stroke-dasharray: 3 4;
}

.difficulty-map-dot {
  stroke: #0b1020;
  stroke-width: 1;
}

.document-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px;
  background: rgba(14, 23, 42, 0.48);
  overflow: hidden;
}

.document-card .muted-copy {
  overflow-wrap: anywhere;
}

.document-reader-text {
  max-height: 420px;
  overflow: auto;
  white-space: pre-wrap;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  background: rgba(7, 12, 23, 0.72);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.86rem;
  line-height: 1.55;
}

@media (max-width: 1360px) {
  .planner-chart-grid,
  .diagnostics-graph-grid,
  .planner-stats-grid,
  .planner-main-grid,
  .settings-layout-grid,
  .split-layout,
  .triple-layout {
    grid-template-columns: 1fr;
  }

  .app-header,
  .tab-strip-wrap {
    flex-direction: column;
    align-items: stretch;
  }

  .app-header-side {
    min-width: 0;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 1120px) {
  .gantt-board-head,
  .gantt-board-row,
  .calendar-week-grid {
    grid-template-columns: 1fr;
  }

  .gantt-axis {
    grid-auto-columns: minmax(88px, 1fr);
    overflow-x: auto;
  }

  .calendar-day-cell {
    min-height: auto;
  }
}

@media (max-width: 760px) {
  .app-shell {
    padding: 14px;
  }

  .bar-chart {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .tab-strip {
    width: 100%;
  }
}
