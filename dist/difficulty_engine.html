<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; base-uri 'none'; object-src 'none'; img-src 'self' data: blob:; style-src 'unsafe-inline'; script-src 'unsafe-inline'; worker-src blob:; connect-src 'self' https: http://127.0.0.1:* http://localhost:*;"
    />
    <title>Difficulty Engine</title>
    <style>
.difficulty-engine-app {
  --bg: #0b1020;
  --bg-alt: #10182b;
  --panel: #111a2d;
  --panel-alt: #151f35;
  --panel-soft: rgba(255, 255, 255, 0.028);
  --border: rgba(189, 205, 233, 0.18);
  --border-strong: rgba(189, 205, 233, 0.34);
  --text: #eef4ff;
  --muted: #97a9ca;
  --accent: #6fd3a3;
  --accent-strong: #9cf0c8;
  --danger: #ff7b7b;
  --warn: #f9cc63;
  --success: #6fd3a3;
  --shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
  --radius: 4px;
  --radius-sm: 2px;
  --radius-xs: 1px;
  --font-ui:
    'SFMono-Regular', 'SF Mono', 'JetBrains Mono', 'Menlo', 'Monaco',
    'Consolas', monospace;
  --font-display:
    'SFMono-Regular', 'SF Mono', 'JetBrains Mono', 'Menlo', 'Monaco',
    'Consolas', monospace;
  min-height: 100vh;
  color: var(--text);
  background:
    radial-gradient(
      circle at top left,
      rgba(111, 211, 163, 0.04),
      transparent 24%
    ),
    linear-gradient(180deg, #09101d 0%, #0d1422 100%);
  isolation: isolate;
  font-family: var(--font-ui);
}

.difficulty-engine-app,
.difficulty-engine-app * {
  box-sizing: border-box;
}

body.difficulty-engine-standalone {
  margin: 0;
  background: #0b1020;
}

body.difficulty-engine-standalone #app {
  min-height: 100vh;
  background: #0b1020;
}

.difficulty-engine-app button,
.difficulty-engine-app input,
.difficulty-engine-app textarea,
.difficulty-engine-app select {
  font: inherit;
}

.app-shell {
  display: grid;
  gap: 14px;
  width: min(1660px, 100%);
  margin: 0 auto;
  padding: 16px;
  position: relative;
}

.app-header,
.tab-strip-wrap,
.card,
.stat-card,
.banner {
  box-shadow: var(--shadow);
}

.app-header {
  display: flex;
  justify-content: space-between;
  gap: 20px;
  align-items: flex-start;
  padding: 14px 16px;
  border-radius: var(--radius);
  background: rgba(17, 26, 45, 0.96);
  border: 1px solid var(--border);
}

.app-header-main {
  display: grid;
  gap: 8px;
  max-width: 780px;
}

.app-header-main h1,
.card-header h2,
.inspector-title {
  margin: 0;
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 0.01em;
}

.app-header-side {
  display: grid;
  grid-template-columns: repeat(4, minmax(92px, 1fr));
  gap: 10px;
  min-width: 420px;
}

.header-stat,
.stat-card,
.calendar-day-cell,
.gantt-board-row,
.ladder-row,
.calendar-chip,
.book-list-item,
.weekday-chip {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--panel-soft);
}

.header-stat {
  display: grid;
  gap: 4px;
  padding: 12px 14px;
}

.header-stat strong {
  font-size: 1.1rem;
}

.eyebrow,
.stat-label,
.field-help,
.muted-copy,
.bar-label,
.bar-value,
.calendar-cell-weekday,
.calendar-missed {
  color: var(--muted);
}

.eyebrow {
  text-transform: uppercase;
  letter-spacing: 0.14em;
  font-size: 0.72rem;
}

.tab-strip-wrap {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: center;
  padding: 8px 12px;
  border-radius: var(--radius);
  background: rgba(17, 26, 45, 0.96);
  border: 1px solid var(--border);
}

.tab-strip,
.toolbar-row,
.detail-toolbar,
.badge-row,
.list-toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
}

.detail-spacer {
  flex: 1;
}

.inline-control {
  display: inline-flex;
  gap: 7px;
  align-items: center;
}

.tab-button,
.primary-button,
.ghost-button,
.book-list-item,
.weekday-chip,
.calendar-chip,
.ladder-row {
  transition:
    transform 120ms ease,
    border-color 120ms ease,
    background 120ms ease;
}

.tab-button,
.primary-button,
.ghost-button,
.book-list-item,
.calendar-chip,
.ladder-row {
  padding: 9px 11px;
  color: var(--text);
  text-align: left;
  cursor: pointer;
}

.tab-button,
.primary-button,
.ghost-button {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.03);
}

.tab-button:hover,
.primary-button:hover,
.ghost-button:hover,
.book-list-item:hover,
.calendar-chip:hover,
.ladder-row:hover,
.weekday-chip:hover {
  transform: translateY(-1px);
  border-color: var(--border-strong);
}

.book-list-item:hover,
.calendar-chip:hover,
.ladder-row:hover {
  transform: none;
}

.tab-button.active,
.primary-button {
  background: rgba(111, 211, 163, 0.12);
  border-color: rgba(111, 211, 163, 0.5);
}

.ghost-button {
  background: transparent;
}

.ghost-button:disabled,
.compact-button:disabled {
  cursor: not-allowed;
  opacity: 0.38;
}

.danger-button {
  color: #ffd9d9;
  border-color: rgba(255, 123, 123, 0.35);
}

.warn-button {
  color: #fff0c2;
  border-color: rgba(249, 204, 99, 0.4);
}

.main-content {
  display: grid;
  gap: 18px;
}

.workspace-content {
  align-content: start;
}

.banner {
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}

.banner-info {
  background: rgba(93, 144, 255, 0.14);
}

.banner-success {
  background: rgba(111, 211, 163, 0.14);
}

.banner-warn {
  background: rgba(249, 204, 99, 0.12);
}

.banner-error {
  background: rgba(255, 123, 123, 0.14);
}

.saved-toast {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 20;
  padding: 10px 13px;
  border: 1px solid rgba(111, 211, 163, 0.42);
  border-radius: var(--radius-sm);
  background: rgba(10, 24, 32, 0.96);
  color: var(--accent-strong);
  box-shadow: var(--shadow);
  opacity: 0;
  pointer-events: none;
  transform: translateY(6px);
  transition:
    opacity 160ms ease,
    transform 160ms ease;
}

.saved-toast-visible {
  opacity: 1;
  transform: translateY(0);
}

.dialog-overlay {
  position: fixed;
  inset: 0;
  z-index: 60;
  display: grid;
  place-items: center;
  padding: 24px;
  background:
    radial-gradient(
      circle at 50% 20%,
      rgba(93, 144, 255, 0.16),
      transparent 34%
    ),
    rgba(2, 6, 18, 0.72);
  backdrop-filter: blur(10px);
}

.dialog-card {
  width: min(620px, 100%);
  display: grid;
  gap: 14px;
  padding: 24px;
  border: 1px solid rgba(151, 169, 202, 0.28);
  border-radius: var(--radius);
  background: linear-gradient(
    145deg,
    rgba(17, 26, 45, 0.98),
    rgba(9, 14, 28, 0.98)
  );
  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.48);
}

.dialog-card h2,
.dialog-card p {
  margin: 0;
}

.dialog-eyebrow {
  color: var(--accent-strong);
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.dialog-actions {
  justify-content: flex-end;
}

.split-layout {
  display: grid;
  grid-template-columns: 340px minmax(0, 1fr);
  gap: 18px;
}

.stack-layout {
  display: grid;
  gap: 16px;
}

.compact-stack {
  gap: 10px;
}

.triple-layout {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 18px;
}

.card {
  border-radius: var(--radius);
  background: rgba(17, 26, 45, 0.94);
  border: 1px solid var(--border);
  overflow: hidden;
}

.panel-card[data-resizable='horizontal'] {
  min-width: min(100%, 260px);
  max-width: 100%;
  resize: horizontal;
  overflow: auto;
}

.card-header {
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--border);
}

.panel-card-header {
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: space-between;
}

.panel-toggle-button {
  flex: 0 0 auto;
}

.card-body {
  padding: 14px;
  display: grid;
  gap: 12px;
}

.card-body[hidden] {
  display: none;
}

.card-body[data-scrollable='true'] {
  overflow: auto;
}

.field,
.field-label-wrap {
  display: grid;
  gap: 6px;
}

.form-grid {
  display: grid;
  gap: 12px;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}

.responsive-grid {
  display: grid;
  gap: 12px;
}

.two-column-grid {
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
}

.flag-grid {
  display: grid;
  gap: 12px;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
}

.field-label {
  font-weight: 600;
}

.text-input,
.select-input,
.text-area {
  width: 100%;
  border: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.04);
  color: var(--text);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
}

.text-area {
  resize: vertical;
}

.locked-input {
  opacity: 0.58;
}

.autocomplete-control {
  position: relative;
  display: grid;
  gap: 8px;
}

.autocomplete-input {
  position: relative;
  z-index: 1;
  background: transparent;
}

.autocomplete-ghost {
  position: absolute;
  top: 9px;
  left: 11px;
  right: 11px;
  color: rgba(151, 169, 202, 0.45);
  pointer-events: none;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.autocomplete-menu {
  display: grid;
  gap: 5px;
}

.autocomplete-option {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  padding: 7px 9px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  background: rgba(255, 255, 255, 0.025);
  color: var(--text);
  text-align: left;
  cursor: pointer;
}

.ai-prompt-area {
  min-height: 180px;
}

.ai-proposal-card {
  border-left: 3px solid rgba(111, 211, 163, 0.56);
}

.checkbox-input {
  width: 18px;
  height: 18px;
}

.planner-layout {
  display: grid;
  gap: 18px;
}

.ai-output-section {
  display: grid;
  gap: 12px;
}

.ai-output-section > h2 {
  margin: 0;
  font-size: 1.05rem;
}

.ai-output-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 18px;
  align-items: start;
}

.ai-clarification-card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 14px;
}

.ai-clarification-card {
  display: grid;
  gap: 10px;
  padding: 14px;
  border: 1px solid rgba(111, 211, 163, 0.22);
  border-radius: var(--radius-sm);
  background:
    linear-gradient(135deg, rgba(111, 211, 163, 0.12), transparent 55%),
    rgba(8, 16, 28, 0.78);
  box-shadow: var(--shadow-soft);
}

.ai-clarification-card > p {
  margin: 0;
}

.epoch-book-card {
  width: 100%;
  color: inherit;
  text-align: left;
  cursor: pointer;
}

.epoch-book-card.selected {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px rgba(111, 211, 163, 0.35);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
}

.planner-stats-grid {
  grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
}

.stat-card {
  padding: 12px;
  background: rgba(255, 255, 255, 0.03);
}

.planner-stat-card {
  gap: 6px;
  display: grid;
}

.stat-value {
  font-size: 1.45rem;
  font-weight: 700;
}

.planner-chart-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 18px;
}

.chart-card-copy {
  font-size: 0.92rem;
}

.bar-chart {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(52px, 1fr));
  gap: 10px;
  align-items: end;
  min-height: 220px;
}

.compact-chart {
  min-height: 180px;
}

.bar-chart-col {
  display: grid;
  gap: 8px;
  align-items: end;
}

.bar-chart-stack {
  position: relative;
  min-height: 150px;
  padding-top: 10px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

.bar-target,
.bar-fill {
  position: absolute;
  left: 50%;
  bottom: 0;
  width: 34px;
  border-radius: 3px 3px 2px 2px;
  transform: translateX(-50%);
}

.bar-target {
  background: rgba(255, 255, 255, 0.08);
  border: 1px dashed rgba(255, 255, 255, 0.18);
}

.bar-fill {
  background: linear-gradient(
    180deg,
    rgba(111, 211, 163, 0.98),
    rgba(91, 179, 218, 0.98)
  );
}

.bar-fill-muted {
  background: linear-gradient(
    180deg,
    rgba(249, 204, 99, 0.95),
    rgba(230, 154, 69, 0.95)
  );
}

.bar-value {
  font-size: 0.82rem;
  text-align: center;
}

.bar-label {
  font-size: 0.74rem;
  text-align: center;
}

.ladder-row {
  display: grid;
  gap: 10px;
  background: rgba(255, 255, 255, 0.02);
}

.ladder-row.selected {
  background: rgba(111, 211, 163, 0.12);
  border-color: rgba(111, 211, 163, 0.44);
}

.ladder-top {
  display: flex;
  justify-content: space-between;
  gap: 12px;
}

.ladder-bar {
  height: 10px;
  border-radius: 3px;
  background: rgba(255, 255, 255, 0.08);
  overflow: hidden;
}

.ladder-fill {
  height: 100%;
  border-radius: inherit;
}

.warning-list,
.stack-list,
.book-list {
  display: grid;
  gap: 12px;
}

.planner-warning-list {
  gap: 10px;
}

.warning-item,
.stack-row,
.book-list-item {
  padding: 14px;
}

.warning-item {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.warning-copy {
  gap: 4px;
}

.warning-fail {
  background: rgba(255, 123, 123, 0.08);
}

.warning-warn {
  background: rgba(249, 204, 99, 0.07);
}

.book-list-item.selected {
  background: rgba(111, 211, 163, 0.16);
  border-color: rgba(111, 211, 163, 0.45);
}

.book-title-button {
  padding: 0;
  color: var(--text);
  font-weight: 700;
  text-align: left;
  cursor: pointer;
  background: transparent;
  border: 0;
}

.book-order-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}

.compact-button {
  min-width: 34px;
  padding: 5px 8px;
  text-align: center;
}

.compact-select {
  max-width: 230px;
}

.book-list-top,
.calendar-chip-top,
.calendar-cell-head,
.progress-head,
.ladder-top {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
}

.book-badge-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(92px, 92px));
  gap: 6px;
  justify-content: end;
}

.book-badge-grid .badge {
  justify-content: center;
}

.enrichment-progress {
  display: grid;
  gap: 8px;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.025);
}

.enrichment-subprogress {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 7px;
}

.subprogress {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  padding: 7px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-xs);
  color: var(--muted);
}

.subprogress-success {
  border-color: rgba(111, 211, 163, 0.24);
}

.subprogress-danger {
  border-color: rgba(255, 123, 123, 0.24);
}

.subprogress-info {
  border-color: rgba(93, 144, 255, 0.24);
}

.progress-block {
  display: grid;
  gap: 7px;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.025);
}

.compact-progress {
  padding: 8px;
  gap: 6px;
}

.progress-head {
  font-size: 0.84rem;
}

.progress-track {
  height: 8px;
  overflow: hidden;
  border-radius: 2px;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.08);
}

.progress-fill {
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(
    90deg,
    rgba(111, 211, 163, 0.92),
    rgba(91, 179, 218, 0.92)
  );
}

.progress-detail {
  font-size: 0.78rem;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 9px;
  border-radius: 3px;
  font-size: 0.75rem;
  border: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.06);
}

.compact-badge-row {
  gap: 6px;
}

.badge-success {
  background: rgba(111, 211, 163, 0.14);
}

.badge-warn {
  background: rgba(249, 204, 99, 0.12);
}

.badge-danger {
  background: rgba(255, 123, 123, 0.14);
}

.planner-main-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.7fr) minmax(320px, 0.8fr);
  gap: 14px;
  align-items: start;
}

.planner-main-column,
.planner-side-column {
  display: grid;
  gap: 14px;
}

.planner-side-column {
  position: sticky;
  top: 12px;
  max-height: calc(100vh - 24px);
  overflow: auto;
  align-self: start;
}

.collapsible-card:not(.open) {
  padding-bottom: 0;
}

.plan-jump-control {
  min-width: 220px;
}

.plan-jump-select {
  min-width: 150px;
}

.settings-shell .card {
  background: linear-gradient(
    180deg,
    rgba(17, 26, 45, 0.98),
    rgba(17, 26, 45, 0.92)
  );
}

.settings-grid {
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
}

.settings-grid .field {
  padding: 10px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  background: rgba(255, 255, 255, 0.015);
}

.source-toggle-row {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  gap: 10px;
  align-items: start;
  padding: 10px;
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.018);
}

.source-toggle-row input[type='checkbox'] {
  margin-top: 3px;
}

.source-subtree {
  display: grid;
  gap: 10px;
  margin-top: 8px;
  padding: 12px;
  border: 1px dashed rgba(255, 255, 255, 0.14);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.014);
}

.status-callout {
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.035);
}

.status-callout-success {
  border-color: rgba(111, 211, 163, 0.42);
  background: rgba(111, 211, 163, 0.11);
}

.status-callout-warn {
  border-color: rgba(249, 204, 99, 0.42);
  background: rgba(249, 204, 99, 0.1);
}

.status-callout-info {
  border-color: rgba(93, 144, 255, 0.38);
  background: rgba(93, 144, 255, 0.1);
}

.inline-code {
  display: block;
  overflow-x: auto;
  max-width: 100%;
  padding: 8px 10px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: var(--radius-sm);
  background: rgba(0, 0, 0, 0.18);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.86rem;
  white-space: nowrap;
}

.gantt-board {
  display: grid;
  gap: 10px;
}

.gantt-scroll-wrap {
  overflow-x: auto;
  padding-bottom: 2px;
}

.gantt-board-head,
.gantt-board-row {
  display: grid;
  grid-template-columns: 260px minmax(0, 1fr);
  gap: 14px;
}

.gantt-head-meta {
  padding: 8px 0;
}

.gantt-axis {

  background: rgba(111, 211, 163, 0.07);
}

.settings-group-toolbar,
.difficulty-map-summary {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.difficulty-map-summary span {
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--muted);
  background: rgba(255, 255, 255, 0.03);
}

.difficulty-map-svg {
  width: 100%;
  min-height: 250px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: rgba(255, 255, 255, 0.02);
}

.chart-axis {
  stroke: rgba(189, 205, 233, 0.32);
  stroke-width: 1;
}

.chart-axis-label {
  fill: var(--muted);
  font-size: 7px;
  letter-spacing: 0.02em;
}

.difficulty-map-legend-box {
  fill: rgba(11, 16, 32, 0.74);
  stroke: rgba(189, 205, 233, 0.22);
  stroke-width: 1;
}

.difficulty-map-legend-label,
.difficulty-map-guide-label {
  fill: var(--muted);
  font-size: 7px;
  letter-spacing: 0.015em;
}

.difficulty-map-identity {
  fill: none;
  stroke: rgba(189, 205, 233, 0.34);
  stroke-width: 1.5;
  stroke-dasharray: 5 5;
}

.difficulty-map-curve {
  fill: none;
  stroke: var(--accent);
  stroke-width: 2.2;
}

.difficulty-map-guide {
  stroke: rgba(249, 204, 99, 0.54);
  stroke-width: 1;
  stroke-dasharray: 3 4;
}

.difficulty-map-dot {
  stroke: #0b1020;
  stroke-width: 1;
}

.document-card {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px;
  background: rgba(14, 23, 42, 0.48);
  overflow: hidden;
}

.document-card .muted-copy {
  overflow-wrap: anywhere;
}

.document-reader-text {
  max-height: 420px;
  overflow: auto;
  white-space: pre-wrap;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  background: rgba(7, 12, 23, 0.72);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 0.86rem;
  line-height: 1.55;
}

.library-resizable-layout {
  grid-template-columns: 460px 8px minmax(0, 1fr);
}

.library-list-column {
  min-width: 0;
}

.split-resize-handle {
  min-height: 120px;
  border-radius: var(--radius-xs);
  background:
    linear-gradient(
      180deg,
      transparent,
      rgba(148, 163, 184, 0.35),
      transparent
    ),
    rgba(255, 255, 255, 0.03);
  cursor: col-resize;
}

.split-resize-handle:focus-visible {
  outline: 2px solid rgba(96, 165, 250, 0.82);
  outline-offset: 2px;
}

@media (max-width: 1360px) {
  .planner-chart-grid,
  .diagnostics-graph-grid,
  .planner-stats-grid,
  .planner-main-grid,
  .settings-layout-grid,
  .split-layout,
  .triple-layout {
    grid-template-columns: 1fr;
  }

  .app-header,
  .tab-strip-wrap {
    flex-direction: column;
    align-items: stretch;
  }

  .app-header-side {
    min-width: 0;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .library-resizable-layout {
    grid-template-columns: 1fr !important;
  }

  .split-resize-handle {
    display: none;
  }
}

@media (max-width: 1120px) {
  .gantt-board-head,
  .gantt-board-row,
  .calendar-week-grid {
    grid-template-columns: 1fr;
  }

  .gantt-axis {
    grid-auto-columns: minmax(88px, 1fr);
    overflow-x: auto;
  }

  .calendar-day-cell {
    min-height: auto;
  }
}

@media (max-width: 760px) {
  .app-shell {
    padding: 14px;
  }

  .bar-chart {
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .tab-strip {
    width: 100%;
  }
}

This guide walks through the normal way to use Difficulty Engine. You do not need to understand solver internals to build a useful plan.

## Jump To

- [Library](#library)
- [Planner Settings](#planner-settings)
- [Plan](#plan)
- [Graphs](#graphs)
- [AI Suggestions](#ai-suggestions)
- [Project](#project)

## Quick Start

- Start in Library. Search for books, add the editions you actually want, and mark which books you already own.
- Open Planner Settings. Set available hours, study weekdays, page range, and prerequisite behavior.
- Use Plan as the main workspace. The Gantt shows long-range order; the calendar shows what to read on each study day.
- Use Graphs when you want to understand why books are connected, which topics overlap, and where co-study links came from.
- Use Project to import, export, configure sources, and enable local qBittorrent document acquisition.

## Library

- Library is where the reading list lives.
- Search can add metadata, subjects, descriptions, page counts, and identifiers.
- Enrichment refreshes metadata and can also look for document or table-of-contents evidence when enabled.
- TOC sourcing prefers trusted local evidence first: manual chapters, completed text/EPUB/OCR text, local PDF outline or embedded text, optional local OCR, then online provider snippets.
- qBittorrent acquisition is PDF-only: the app selects a matching PDF at the torrent root or one folder down, and blocks qBittorrent text/EPUB/OCR side files.
- Manual prerequisites and co-study links are useful when you know something the metadata does not.
- Reading scope lets you skip learned non-core sections such as TOCs, appendices, indexes, solution/reference material, and duplicates for planning. The original TOC and source pages stay intact.
- Document badges tell you whether metadata, a sourced file, or a usable table of contents has been found.

## Planner Settings

- Hours per day and study weekdays are hard planning inputs.
- Strict page floor means the minimum pages per day must fit, or the planner reports a conflict.
- Relaxed page recommendation lets the planner lower the page floor when the strict floor cannot fit.
- Learner profile sets the planner's default attitude: balanced, confidence-building, fast, deep mastery, or manual.
- Profiles change challenge, pacing spread, ramp shape, uncertainty tolerance, and prerequisite strictness in bounded ways. They do not override manual locks or impossible constraints.
- Relative pacing changes the desired spread of page targets across the current reading list before hard limits are applied.
- Display difficulty mapping changes charts and colors only. It does not change hours, finish date, or calendar allocation.
- Scheduler mode changes how the planner chooses between balance, critical paths, and fastest completion.
- Advanced settings are for changing model behavior. If a setting affects scheduling, the context panel should say so.

## Plan

- The Gantt is the long-range timeline.
- The calendar is the day-by-day reading surface.
- Clicking a book or calendar chip selects it and opens logging details.
- Actual minutes and actual pages override the planned estimate for that day.
- Book details show desired pages/day, feasible range, final pages/day, and why a floor, time budget, max page cap, or manual window is binding.
- Early sessions on a book may start lighter and ramp toward the base target. Very hard books damp this ramp so the plan does not pretend difficult material quickly becomes easy.
- Warnings explain plan conflicts or non-blocking concerns. Blocking errors cannot be dismissed.

## Graphs

- The relation DAG shows prerequisite direction.
- Co-study links show books the planner thinks should be read together.
- The topic overlap explorer shows which books share topics and how large those overlaps are.
- Matrix overlap view is the default because it scales better than Venn-style drawings for complex libraries.
- Spatial graph views are useful for intuition, but the matrix is the source of truth for overlap membership.

## AI Suggestions

- AI Suggestions can propose books to add, but it does not mutate the library until you review and apply a proposal.
- The request includes the full non-secret planner context: books, relations, constraints, reading scope, progress summaries, difficulty evidence, plan summaries, document status labels, and warnings.
- Provider defaults are cost-first. You can still choose higher-quality models when needed.
- API keys are local integration settings and are never exported inside project JSON.

## Project

- Project import/export uses the canonical project format.
- Local qBittorrent credentials are stored locally and are not exported.
- Source toggles control which providers can contribute metadata, documents, and table-of-contents evidence.
- Local OCR fallback is opt-in and only works through the local bridge when Poppler/Tesseract are installed.
- Solve everything for me asks a few goal/deadline/confidence questions, evaluates a bounded optimization portfolio, and shows a recommended plan plus alternatives. It only changes settings after you review and apply the proposal.
- Diagnostics are hidden in normal builds. Use the debug build when you need detailed engine evidence.

## Terms

- **Schedule difficulty**: planner truth used for time and scheduling.
- **Display difficulty**: visual mapping used for charts, colors, and explanations.
- **Effective reading pages**: derived workload pages after trusted reading-scope skips. Source page count is preserved.
- **Local title cue**: introductory or advanced wording that only matters relative to a close same-topic comparator.
- **Strict page floor**: minimum pages/day is hard; conflicts are reported rather than hidden.
- **Reading ramp**: nonlinear per-book ramp that starts normal books lighter and approaches the base target over later sessions.
- **Relative pacing**: spreads page targets across the reading list before feasibility clamps are applied.
- **Backfill**: starts another eligible book when a branch is blocked.
- **Prerequisite overlap**: permits dependent work before every prerequisite is fully finished under the configured policy.
